<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>扫描通行 - 河南农业大学假期留校人员出入管理系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="扫描宿舍通行二维码进入假期留校人员出入管理系统">
  <style>
    :root {
      --status-primary: #34c759;
      --font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      font-family: var(--font-family);
      background: #0a0a0a;
      color: #ffffff;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
      position: relative;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo {
      height: 40px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 6px;
    }

    .scan-stage {
      position: relative;
      width: 80vw;
      max-width: 360px;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 0 2px rgba(52, 199, 89, 0.5), 0 12px 40px rgba(0, 0, 0, 0.6);
    }

    #qr-reader {
      width: 100%;
      height: 100%;
    }

    #qr-reader video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 扫描框装饰角 */
    .scan-stage::before,
    .scan-stage::after {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border: 3px solid var(--status-primary);
      pointer-events: none;
      z-index: 5;
    }

    .scan-stage::before {
      top: 12px;
      left: 12px;
      border-right: none;
      border-bottom: none;
      border-top-left-radius: 6px;
    }

    .scan-stage::after {
      bottom: 12px;
      right: 12px;
      border-left: none;
      border-top: none;
      border-bottom-right-radius: 6px;
    }

    .tip {
      margin-top: 22px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.78);
      text-align: center;
      min-height: 18px;
    }

    /* 手势/重试覆盖层（iOS 需用户手势触发摄像头） */
    .tap-mask {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.97);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      cursor: pointer;
    }

    .tap-mask.hidden {
      display: none;
    }

    .tap-card {
      text-align: center;
      padding: 0 30px;
    }

    .tap-icon {
      font-size: 56px;
      margin-bottom: 16px;
      line-height: 1;
    }

    .tap-text {
      font-size: 15px;
      color: #ffffff;
      font-weight: 500;
      max-width: 300px;
      line-height: 1.6;
      white-space: pre-line;
      margin: 0 auto;
    }

    .tap-btn {
      display: inline-block;
      margin-top: 22px;
      padding: 13px 36px;
      background: var(--status-primary);
      color: #ffffff;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 6px 18px rgba(52, 199, 89, 0.4);
    }

    .tap-btn:active {
      transform: scale(0.96);
    }

    /* Toast */
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(40px + env(safe-area-inset-bottom));
      transform: translate(-50%, 20px);
      background: rgba(0, 0, 0, 0.88);
      color: #ffffff;
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      max-width: 86vw;
      text-align: center;
      white-space: pre-line;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .toast.ok {
      background: rgba(52, 199, 89, 0.96);
    }

    .toast.err {
      background: rgba(255, 59, 48, 0.96);
    }
  </style>
</head>

<body>
  <div class="logo-wrap">
    <img class="logo" src="./images/henau_top2.png" alt="河南农业大学">
    <div class="title">假期留校人员出入管理系统</div>
    <div class="subtitle">请扫描宿舍通行二维码</div>
  </div>

  <div class="scan-stage">
    <div id="qr-reader"></div>
  </div>

  <div class="tip" id="tip">正在启动摄像头...</div>

  <!-- 手势/重试覆盖层 -->
  <div class="tap-mask hidden" id="tap-mask">
    <div class="tap-card">
      <div class="tap-icon">📷</div>
      <div class="tap-text" id="tap-text">点击开始扫描</div>
      <div class="tap-btn">开始扫描</div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    (function () {
      var tip = document.getElementById('tip');
      var tapMask = document.getElementById('tap-mask');
      var tapText = document.getElementById('tap-text');
      var toastEl = document.getElementById('toast');
      var html5QrCode = null;
      var scanning = false;
      var jumped = false;

      function showToast(text, type) {
        toastEl.textContent = text;
        toastEl.className = 'toast ' + (type === 'err' ? 'err' : 'ok');
        void toastEl.offsetWidth; // 强制重排以重启动画
        toastEl.classList.add('show');
        clearTimeout(toastEl._t);
        toastEl._t = setTimeout(function () {
          toastEl.classList.remove('show');
        }, 2600);
      }

      function jumpToInfo() {
        if (jumped) return;
        jumped = true;
        stopScan();
        showToast('✓ 通行验证通过', 'ok');
        tip.textContent = '正在跳转...';
        setTimeout(function () {
          window.location.href = 'info.html';
        }, 700);
      }

      function stopScan() {
        if (html5QrCode && scanning) {
          scanning = false;
          html5QrCode.stop().then(function () {
            html5QrCode.clear();
          }).catch(function () {});
        }
      }

      function handleStartError(err) {
        scanning = false;
        var name = err && err.name;
        var msg = '点击开始扫描';
        if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
          msg = '摄像头权限被拒绝\n请在浏览器设置中允许后点击重试';
        } else if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
          msg = '未检测到摄像头设备';
        } else if (name === 'NotReadableError') {
          msg = '摄像头被其他程序占用\n请关闭后重试';
        } else if (name === 'NotSupportedError' || name === 'TypeError') {
          msg = '当前环境不支持摄像头扫描\n需在 HTTPS 环境下访问';
        }
        tapText.textContent = msg;
        tapMask.classList.remove('hidden');
        tip.textContent = '';
      }

      function startScan() {
        if (typeof Html5Qrcode === 'undefined') {
          tapText.textContent = '扫描组件加载失败\n请检查网络后点击重试';
          tapMask.classList.remove('hidden');
          tip.textContent = '';
          return;
        }
        if (scanning) return;
        tapMask.classList.add('hidden');
        scanning = true;
        tip.textContent = '正在启动摄像头...';

        try {
          html5QrCode = new Html5Qrcode('qr-reader', { verbose: false });
        } catch (e) {
          scanning = false;
          tapText.textContent = '扫描初始化失败';
          tapMask.classList.remove('hidden');
          tip.textContent = '';
          return;
        }

        html5QrCode.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.333334 },
          function (decodedText) {
            // 扫到任意二维码，立即跳转信息页
            jumpToInfo();
          },
          function (errorMessage) {
            // 每帧未识别，忽略
          }
        ).catch(function (err) {
          handleStartError(err);
        });
      }

      // 点击覆盖层重试（提供用户手势以满足 iOS 要求）
      tapMask.addEventListener('click', function () {
        startScan();
      });

      // 自动启动（桌面端可直接启动；iOS 会失败并显示点击覆盖层）
      window.addEventListener('load', function () {
        setTimeout(startScan, 120);
      });

      // 基础防调试
      document.addEventListener('contextmenu', function (e) { e.preventDefault(); });
      document.addEventListener('selectstart', function (e) { e.preventDefault(); });
      document.addEventListener('copy', function (e) { e.preventDefault(); });
    })();
  </script>
</body>

</html>
